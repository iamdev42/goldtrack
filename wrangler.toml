name = "goldtrack"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# SPA assets — Cloudflare Workers Assets serves the static build
# and falls back to index.html for unknown paths (SPA routing)
[assets]
directory = "./build/client"
not_found_handling = "single-page-application"

# Env vars set in Cloudflare dashboard:
# - VITE_SUPABASE_URL
# - VITE_SUPABASE_ANON_KEY
# (These are baked into the build at build time, so also set them in CI secrets)
